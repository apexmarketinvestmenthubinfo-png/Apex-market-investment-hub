<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks - APEX MARKET INVESTMENT HUB</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#020d24;
background-image:
radial-gradient(circle at top left,#00c6ff22,transparent 35%),
radial-gradient(circle at bottom right,#0066ff22,transparent 35%);
color:#fff;
min-height:100vh;
padding-bottom:90px;
}

.header{
text-align:center;
padding:25px 15px;
}

.platform-name{
font-size:28px;
font-weight:700;
color:#00cfff;
letter-spacing:1px;
text-shadow:0 0 15px #00cfff;
}

.container{
padding:15px;
}

.card{
background:linear-gradient(
135deg,
rgba(21,39,74,.95),
rgba(14,30,58,.95)
);
border:1px solid rgba(0,200,255,.15);
border-radius:24px;
padding:20px;
box-shadow:
0 0 20px rgba(0,200,255,.08),
inset 0 0 15px rgba(255,255,255,.02);
margin-bottom:18px;
}

.stats-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.stat-box{
background:rgba(0,180,255,.08);
border:1px solid rgba(0,200,255,.15);
border-radius:18px;
padding:18px;
}

.stat-title{
font-size:15px;
color:#c7d8ef;
margin-bottom:10px;
}

.stat-value{
font-size:34px;
font-weight:700;
color:#00cfff;
}

.maturity{
font-size:32px;
}

.status-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 0;
font-size:18px;
color:#dbe8ff;
}

.status-row:not(:last-child){
border-bottom:1px solid rgba(255,255,255,.08);
}

.status-value{
font-size:32px;
font-weight:700;
color:#00cfff;
}

.table-card{
overflow:hidden;
}

.table-header{
display:grid;
grid-template-columns:1.3fr 1fr 1fr;
padding:15px 0;
font-weight:600;
font-size:16px;
color:#bde6ff;
border-bottom:1px solid rgba(255,255,255,.08);
}

.plan-row{
display:grid;
grid-template-columns:1.3fr 1fr 1fr;
padding:15px 0;
border-bottom:1px solid rgba(255,255,255,.06);
align-items:center;
font-size:14px;
}

.plan-row:last-child{
border-bottom:none;
}

.empty-space{
height:80px;
display:flex;
justify-content:center;
align-items:center;
color:#9cb6d9;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:72px;

    display:flex;
    justify-content:space-evenly;
    align-items:center;

    padding:0 8px;

    background:rgba(9,19,38,.95);
    backdrop-filter:blur(25px);

    border-top:1px solid rgba(255,255,255,.08);

    box-shadow:
        0 -8px 30px rgba(0,0,0,.45);

    z-index:999;
}

.nav-btn{
    flex:1;

    display:flex;
    flex-direction:row;      /* Horizontal */
    align-items:center;
    justify-content:center;
    gap:6px;

    text-decoration:none;
    color:#9ba7c7;

    font-size:12px;
    font-weight:600;

    transition:.3s ease;
}

.nav-icon{
    font-size:20px;
    line-height:1;
}

.nav-btn:hover,
.active-nav{
    color:#00f7ff;
}

.nav-btn:hover .nav-icon,
.active-nav .nav-icon{
    text-shadow:
        0 0 10px rgba(0,247,255,.8),
        0 0 20px rgba(0,247,255,.5);
}

@media(max-width:480px){

.platform-name{
font-size:22px;
}

.stat-value{
font-size:28px;
}

.status-value{
font-size:28px;
}

.table-header{
font-size:13px;
}

.plan-row{
font-size:12px;
}

}

</style>
</head>

<body>

<div class="header">
<div class="platform-name">
APEX MARKET INVESTMENT HUB
</div>
</div>

<div class="container">

<div class="card">

<div class="stats-grid">

<div class="stat-box">
<div class="stat-title">Total Plans</div>
<div class="stat-value" id="totalPlans">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Days to Maturity</div>
<div class="stat-value maturity" id="daysToMaturity">21 Days</div>
</div>

</div>

</div>

<div class="card">

<div class="status-row">
<span>In Progress</span>
<span class="status-value" id="inProgress">0</span>
</div>

<div class="status-row">
<span>Matured Plans</span>
<span class="status-value" id="maturedPlans">0</span>
</div>

</div>

<div class="card table-card">

<div class="table-header">
<div>Type</div>
<div>Days Earned</div>
<div>Total Earnings</div>
</div>

<div id="plansContainer">
<div class="empty-space">
No active plans
</div>
</div>

</div>

</div>

<!-- NAV -->
<div class="bottom-nav">

    <a href="dashboard.html" class="nav-btn active-nav">
        <span class="nav-icon">⌂</span>
        <span>Home</span>
    </a>

    <a href="tasks.html" class="nav-btn">
        <span class="nav-icon">✓</span>
        <span>Tasks</span>
    </a>

    <a href="plans.html" class="nav-btn">
        <span class="nav-icon">◈</span>
        <span>Plans</span>
    </a>

    <a href="team.html" class="nav-btn">
        <span class="nav-icon">◉</span>
        <span>Team</span>
    </a>

    <a href="profile.html" class="nav-btn">
        <span class="nav-icon">◌</span>
        <span>Profile</span>
    </a>

</div>

<script type="module">

import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



const firebaseConfig = {

apiKey:"AIzaSyC-d_LdGleI1U1NEWLjz7FPz7gPycVOB_4",

authDomain:"apex-market-investment-h-643fc.firebaseapp.com",

databaseURL:"https://apex-market-investment-h-643fc-default-rtdb.europe-west1.firebasedatabase.app",

projectId:"apex-market-investment-h-643fc",

storageBucket:"apex-market-investment-h-643fc.firebasestorage.app",

messagingSenderId:"96469134780",

appId:"1:96469134780:web:b1b443b0467083f843cfb9",

measurementId:"G-NB3LXMPGTV"

};



const app =
initializeApp(firebaseConfig);


const db =
getDatabase(app);


const auth =
getAuth(app);




function format(ms){

if(ms<=0)
return "Completed";


let sec =
Math.floor(ms/1000);


let days =
Math.floor(sec/86400);


sec%=86400;


let h =
Math.floor(sec/3600);


let m =
Math.floor((sec%3600)/60);


return `${days}d ${h}h ${m}m`;

}





function loadTasks(uid){


onValue(
ref(db,`users/${uid}/investments`),
snap=>{


let data =
snap.val() || {};


let container =
document.getElementById("plansContainer");


container.innerHTML="";



let total=0;

let active=0;

let matured=0;


let nearest=null;




Object.values(data)
.forEach(inv=>{


if(!inv)
return;



total++;


let start =
Number(inv.start||0);


let amount =
Number(inv.amount||0);



let end =
start +
(21*24*60*60*1000);



let remaining =
end-Date.now();



let done =
remaining<=0;



if(done){

matured++;

}else{

active++;


if(
nearest===null ||
remaining<nearest
){

nearest=remaining;

}

}



let earnings =
amount+(amount*0.5);



container.innerHTML += `


<div class="plan-row">


<div>

${inv.plan}

</div>



<div>


<span class="count"
data-end="${end}">

${done?"Completed":format(remaining)}

</span>


</div>



<div>

KSh ${earnings.toLocaleString()}

</div>


</div>


`;



});





if(total===0){

container.innerHTML=`

<div class="empty-space">

No active plans

</div>

`;

}




document.getElementById("totalPlans")
.innerHTML=total;



document.getElementById("inProgress")
.innerHTML=active;



document.getElementById("maturedPlans")
.innerHTML=matured;



document.getElementById("daysToMaturity")
.innerHTML =
nearest?
format(nearest):
"No Active Plan";



});

}




setInterval(()=>{


document.querySelectorAll(".count")
.forEach(el=>{


let end =
Number(el.dataset.end);



let left =
end-Date.now();



el.innerHTML =
format(left);



});


},1000);





onAuthStateChanged(auth,user=>{


if(!user){

document.getElementById("plansContainer")
.innerHTML =
`
<div class="empty-space">
Login required
</div>
`;

return;

}



loadTasks(user.uid);


});

</script>
</body>
</html>
