<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apex Market Investment Hub - Login</title>

<style>
/* ===== YOUR ORIGINAL DESIGN (UNCHANGED) ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#081122,#000);
overflow:hidden;
color:white;
}

body::before{
content:'';
position:fixed;
inset:0;
background:url('https://www.transparenttextures.com/patterns/stardust.png');
opacity:.18;
z-index:-3;
}

.glow1,.glow2,.glow3{
position:fixed;
border-radius:50%;
filter:blur(130px);
z-index:-2;
}

.glow1{width:500px;height:500px;background:rgba(0,255,213,.25);top:-180px;left:-180px;}
.glow2{width:500px;height:500px;background:rgba(255,0,200,.18);bottom:-180px;right:-180px;}
.glow3{width:350px;height:350px;background:rgba(255,215,0,.15);top:35%;left:40%;}

.container{
width:92%;
max-width:430px;
padding:35px;
border-radius:24px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 40px rgba(0,255,213,.08), inset 0 0 20px rgba(255,255,255,.03);
}

.logo{text-align:center;margin-bottom:10px;font-size:26px;font-weight:700;color:#00ffd5;}
.logo span{color:#ffd700;}

.subtitle{text-align:center;color:rgba(255,255,255,.7);font-size:13px;margin-bottom:28px;}

.input-group{margin-bottom:18px;}
.input-group label{display:block;margin-bottom:8px;font-size:13px;color:#d8d8d8;}
.input-group input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid rgba(0,255,213,.2);
background:rgba(0,0,0,.35);
color:white;
outline:none;
font-size:14px;
}

.password-box{position:relative;}
.toggle{position:absolute;right:15px;top:16px;font-size:12px;color:#00ffd5;cursor:pointer;}

.login-btn{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#00ffd5,#ff00cc,#ffd700);
color:black;
font-weight:700;
cursor:pointer;
}

.footer{text-align:center;margin-top:18px;font-size:13px;color:#bdbdbd;}
.footer a{color:#00ffd5;text-decoration:none;font-weight:600;}
</style>
</head>

<body>

<div class="glow1"></div>
<div class="glow2"></div>
<div class="glow3"></div>

<div class="container">

    <div class="logo">
        Apex Market <span>Investment Hub</span>
    </div>

    <div class="subtitle">
    Secure Login To Your Investment Dashboard
</div>

<div id="notification" style="
display:none;
margin-bottom:15px;
padding:12px;
border-radius:12px;
text-align:center;
font-size:13px;
font-weight:600;
"></div>

    <div class="input-group">
        <label>Gmail Address</label>
        <input type="email" id="email" placeholder="Enter your Gmail address">
    </div>

    <div class="input-group">
        <label>Password</label>
        <div class="password-box">
            <input type="password" id="password" placeholder="Enter your password">
            <span class="toggle" onclick<span class="toggle" onclick="togglePassword('password', this)">Show</span>
        </div>
    </div>

    <button class="login-btn" onclick="login()">
        Login Account
    </button>

    <div class="footer">
        Don't have an account?
        <a href="register.html">Create Account</a>
    </div>

</div>

<!-- ===== FIREBASE REAL-TIME SYNC (ADDED) ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
window.togglePassword = function (id, el) {
  const input = document.getElementById(id);

  if (!input) return;

  if (input.type === "password") {
    input.type = "text";
    el.innerText = "Hide";
  } else {
    input.type = "password";
    el.innerText = "Show";
  }
};
import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getDatabase,
  ref,
  set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* NOTIFICATION FUNCTION */
function showNotification(message, type = "success") {

  const notification = document.getElementById("notification");

  notification.style.display = "block";
  notification.textContent = message;

  if (type === "success") {
    notification.style.background = "rgba(0,255,136,.15)";
    notification.style.border = "1px solid rgba(0,255,136,.4)";
    notification.style.color = "#00ff88";
  } else {
    notification.style.background = "rgba(255,59,59,.15)";
    notification.style.border = "1px solid rgba(255,59,59,.4)";
    notification.style.color = "#ff6b6b";
  }

  setTimeout(() => {
    notification.style.display = "none";
  }, 3000);
}

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyC-d_LdGleI1U1NEWLjz7FPz7gPycVOB_4",
  authDomain: "apex-market-investment-h-643fc.firebaseapp.com",
  databaseURL: "https://apex-market-investment-h-643fc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "apex-market-investment-h-643fc",
  storageBucket: "apex-market-investment-h-643fc.firebasestorage.app",
  messagingSenderId: "96469134780",
  appId: "1:96469134780:web:b1b443b0467083f843cfb9",
  measurementId: "G-NB3LXMPGTV"
};

/* INITIALIZE FIREBASE */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

/* LOGIN FUNCTION */
window.login = async function () {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    showNotification("Please enter email and password", "error");
    return;
  }

  try {

    const userCredential =
      await signInWithEmailAndPassword(
        auth,
        email,
        password
      );

    const user = userCredential.user;

    /* UPDATE LAST LOGIN */
    await set(ref(db, "users/" + user.uid + "/session"), {
      email: user.email,
      lastLogin: Date.now()
    });

    /* SAVE UID */
    localStorage.setItem("apexUser", user.uid);

    /* SUCCESS MESSAGE */
    showNotification("Login Successfully ✓", "success");

    /* REDIRECT */
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1500);

  } catch (error) {

    console.error("Firebase Error:", error.code);
    console.error(error.message);

    showNotification("Invalid Credentials", "error");

  }

};
</script>
</body>
</html>
