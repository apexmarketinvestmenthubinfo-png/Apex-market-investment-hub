<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Market Investment Hub - Plans</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#050816;color:#fff;padding-bottom:90px;overflow-x:hidden}

body::before,body::after{
content:'';
position:fixed;
width:400px;height:400px;
border-radius:50%;
filter:blur(150px);
opacity:.3;
z-index:-1;
}

body::before{background:linear-gradient(45deg,#00f7ff,#0066ff);top:-120px;left:-120px}
body::after{background:linear-gradient(45deg,#ff00ff,#6a00ff);bottom:-120px;right:-120px}

.header{
padding:20px;text-align:center;
font-size:24px;font-weight:700;
background:rgba(255,255,255,.05);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,.08)
}

.subtitle{text-align:center;color:#00f7ff;margin:10px 0 20px;font-size:15px}
.container{padding:15px}

.plan{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
padding:20px;margin-bottom:20px;
backdrop-filter:blur(15px)
}

.plan h3{color:#00f7ff;font-size:26px;margin-bottom:15px;text-align:center}
.plan p{color:#ccc;margin:10px 0;font-size:15px;line-height:1.8}

.status{margin-top:12px;font-size:14px;color:#00ff88;font-weight:600}

button{
width:100%;margin-top:15px;
padding:14px;border:none;border-radius:12px;
background:linear-gradient(90deg,#00f7ff,#0066ff);
color:#fff;font-size:16px;font-weight:600;
cursor:pointer
}

button:disabled{background:#444;cursor:not-allowed}

.bottom-nav{
position:fixed;bottom:0;left:0;right:0;
height:70px;background:#08111f;
display:flex;justify-content:space-around;
align-items:center;border-top:1px solid rgba(255,255,255,.08)
}

.nav-btn{text-decoration:none;color:#fff;font-size:12px;display:flex;flex-direction:column;align-items:center}
.nav-icon{font-size:22px;margin-bottom:3px}
.active{color:#00f7ff}
</style>
</head>

<body>

<div class="header">APEX MARKET INVESTMENT HUB</div>
<div class="subtitle">Investment Plans</div>

<div class="container" id="plans"></div>

<div class="bottom-nav">
<a href="index.html" class="nav-btn"><div class="nav-icon">🏠</div>Home</a>
<a href="deposit.html" class="nav-btn"><div class="nav-icon">💰</div>Deposit</a>
<a href="plans.html" class="nav-btn active"><div class="nav-icon">📊</div>Plans</a>
<a href="withdraw.html" class="nav-btn"><div class="nav-icon">💳</div>Withdraw</a>
<a href="profile.html" class="nav-btn"><div class="nav-icon">👤</div>Profile</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyC-d_LdGleI1U1NEWLjz7FPz7gPycVOB_4",
authDomain: "apex-market-investment-h-643fc.firebaseapp.com",
databaseURL: "https://apex-market-investment-h-643fc-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "apex-market-investment-h-643fc",
storageBucket: "apex-market-investment-h-643fc.firebasestorage.app",
messagingSenderId: "96469134780",
appId: "1:96469134780:web:b1b443b0467083f843cfb9",
measurementId: "G-NB3LXMPGTV"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const container = document.getElementById("plans");

const plans = [
{name:"Starter Plan",amount:1000,roi:50},
{name:"Bronze Plan",amount:2500,roi:50},
{name:"Silver Plan",amount:5000,roi:50},
{name:"Gold Plan",amount:10000,roi:50},
{name:"Premium Plan",amount:20000,roi:50},
{name:"Elite Plan",amount:30000,roi:50},
{name:"Diamond Plan",amount:50000,roi:50},
{name:"VIP Plan",amount:75000,roi:50},
{name:"Executive Plan",amount:100000,roi:50},
{name:"Ultimate Plan",amount:200000,roi:50}
];

let currentUserId = null;
let timerStarted = false;

/* 🔔 TOAST SYSTEM (FIXED) */
function showToast(msg){

let toast = document.getElementById("toast");

if(!toast){
toast = document.createElement("div");
toast.id = "toast";
document.body.appendChild(toast);
}

toast.innerText = msg;
toast.style.cssText = `
position:fixed;
bottom:100px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.85);
color:#00f7ff;
padding:12px 18px;
border-radius:12px;
font-weight:600;
z-index:9999;
opacity:1;
transition:0.3s;
`;

setTimeout(() => {
toast.style.opacity = "0";
}, 2200);
}

/* ⏳ FORMAT TIMER */
function format(ms){
const total = Math.floor(ms / 1000);
const d = Math.floor(total / 86400);
const h = Math.floor((total % 86400) / 3600);
const m = Math.floor((total % 3600) / 60);
const s = total % 60;
return `${d}d ${h}h ${m}m ${s}s`;
}

/* ⏳ SINGLE TIMER ENGINE */
function startCountdown(){

if(timerStarted) return;
timerStarted = true;

setInterval(() => {

document.querySelectorAll("[data-start]").forEach(el => {

const start = Number(el.dataset.start || 0);
if(!start) return;

const now = Date.now();

const end21 = start + (21 * 24 * 60 * 60 * 1000);
const end72 = start + (72 * 60 * 60 * 1000);

const r21 = end21 - now;
const r72 = end72 - now;

if(el.dataset.type === "21"){
el.innerText = r21 > 0 ? format(r21) : "Completed";
}

if(el.dataset.type === "72"){
el.innerText = r72 > 0 ? format(r72) : "Cycle Ready";
}

});

}, 1000);
}

/* 🔐 AUTH + REALTIME SYNC */
onAuthStateChanged(auth, (user) => {

if(!user){
container.innerHTML = "<p>Please login first</p>";
return;
}

currentUserId = user.uid;

const investRef = ref(db, `users/${currentUserId}/investments`);

onValue(investRef, (snap) => {

const data = snap.val() || {};
container.innerHTML = "";

plans.forEach((plan,index)=>{

const invested = data["plan_"+index];
const start = invested?.start || 0;

const profit72 = Math.round(plan.amount * 0.5);
const total21 = plan.amount + (profit72 * 7);

container.innerHTML += `
<div class="plan">

<h3>${plan.name}</h3>

<p><strong>Investment:</strong> KES ${plan.amount.toLocaleString()}</p>

<p><strong>Active:</strong>
${invested ? "KES " + plan.amount.toLocaleString() : "KES 0"}
</p>

<p><strong>Profit per 72 Hours:</strong> KES ${profit72.toLocaleString()}</p>

<p><strong>Total After 21 Days:</strong> KES ${total21.toLocaleString()}</p>

<div class="status">
${invested ? "Running Investment" : "Not Invested"}
</div>

<p><strong>Time Left (21D):</strong>
<span data-start="${start}" data-type="21">${start ? "Loading..." : "--"}</span>
</p>

<p><strong>Next ROI Cycle (72H):</strong>
<span data-start="${start}" data-type="72">${start ? "Loading..." : "--"}</span>
</p>

<button onclick="invest(${index})" ${invested ? "disabled" : ""}>
${invested ? "Invested" : "Invest Now"}
</button>

</div>
`;
});

startCountdown();
});

});

/* 🚀 INVEST FUNCTION */
window.invest = async function(index){

if(!currentUserId){
showToast("User not authenticated");
return;
}

try {
await set(ref(db, `users/${currentUserId}/investments/plan_${index}`), {
plan: plans[index].name,
amount: plans[index].amount,
roi: plans[index].roi,
start: Date.now()
});

showToast("Plan invested successfully");

} catch (e) {
console.error(e);
showToast("Failed to activate investment");
}
};
</script>

</body>
</html>
