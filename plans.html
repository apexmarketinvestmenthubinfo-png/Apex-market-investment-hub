<style>

0 0 30px rgba(0,247,255,.25);

.plan h3{

}

color:#ddd;

}

width:100%;
padding:14px;

border:none;
border-radius:15px;

background:
linear-gradient(90deg,
#00f7ff,
#0066ff);

color:white;
font-weight:700;

margin-top:15px;

box-shadow:
0 0 20px #0066ff;

}



button:disabled{

background:#444;
box-shadow:none;

}




.bottom-nav{

position:fixed;
bottom:0;
left:0;
right:0;

height:70px;

display:flex;
justify-content:space-around;

background:#091326;

z-index:999;

}



.nav-btn{

color:#aaa;
text-decoration:none;
font-size:12px;
text-align:center;

}



.nav-icon{

font-size:20px;
display:block;

}



.active-nav{

color:#00f7ff;

}





</style>

<body>

APEX MARKET INVESTMENT HUB

<script type="module">

import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue,
get,
set,
update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



const firebaseConfig = {

apiKey:"AIzaSyC-d_LdGleI1U1NEWLjz7FPz7gPycVOB_4",

authDomain:"apex-market-investment-h-643fc.firebaseapp.com",

databaseURL:"https://apex-market-investment-h-643fc-default-rtdb.europe-west1.firebasedatabase.app",

projectId:"apex-market-investment-h-643fc",

storageBucket:"apex-market-investment-h-643fc.firebasestorage.app",

messagingSenderId:"96469134780",

appId:"1:96469134780:web:b1b443b0467083f843cfb9",

measurementId:"G-NB3LXMPGTV"

};



const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const auth = getAuth(app);



const plans=[

{name:"Starter Plan",amount:1000},
{name:"Bronze Plan",amount:2500},
{name:"Silver Plan",amount:5000},
{name:"Gold Plan",amount:10000},
{name:"Premium Plan",amount:20000},
{name:"Elite Plan",amount:30000},
{name:"Diamond Plan",amount:50000},
{name:"VIP Plan",amount:75000},
{name:"Executive Plan",amount:100000},
{name:"Ultimate Plan",amount:200000}

];


let uid=null;

let currentInvestments={};



function cleanNumber(value){

if(typeof value==="string"){
value=value.replace(/[^0-9.]/g,"");
}

let n=parseFloat(value);

return isNaN(n)?0:n;

}




function notify(text){

let old = document.getElementById("notify");

if(old){
old.remove();
}


let box = document.createElement("div");

box.id="notify";

box.innerHTML = text;


box.style.cssText = `

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:80%;
max-width:320px;

padding:25px;

border-radius:25px;

background:
linear-gradient(135deg,#001f3f,#0066ff);

color:white;

font-weight:700;

text-align:center;

font-size:16px;

box-shadow:
0 0 40px #00f7ff;

z-index:99999;

`;

document.body.appendChild(box);


setTimeout(()=>{

box.remove();

},2500);


}




function format(ms){

if(ms<=0)
return "00:00:00";


let sec=Math.floor(ms/1000);

let h=Math.floor(sec/3600);

let m=Math.floor((sec%3600)/60);

let s=sec%60;


return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;

}





onAuthStateChanged(auth,user=>{


if(!user){

location="login.html";

return;

}


uid=user.uid;



onValue(
ref(db,`users/${uid}`),
snap=>{


let data=snap.val() || {};



// BALANCE REALTIME

let balance = cleanNumber(data.balance);



// DEPOSIT REALTIME FIX

let deposit = cleanNumber(
data.deposit ??
data.totalDeposit ??
data.deposits ??
0
);



// INVESTMENTS

currentInvestments =
data.investments || {};



let profit=0;



Object.values(currentInvestments)
.forEach(i=>{


if(i){

profit += cleanNumber(i.totalProfit);

}


});





document.getElementById("mainBalance").innerHTML =
"KSh " + balance.toLocaleString();



document.getElementById("totalProfit").innerHTML =
"KSh " + profit.toLocaleString();



let dep =
document.getElementById("totalDeposit");


if(dep){

dep.innerHTML =
"KSh " + deposit.toLocaleString();

}



render();


});


});






function render(){


let box=document.getElementById("plans");


box.innerHTML="";



plans.forEach((p,i)=>{


let inv =
currentInvestments["plan_"+i];



let active =
inv &&
inv.status==="running";



let cycle=0;

let maturity=0;



if(active){

cycle =
(inv.lastProfit+259200000)-Date.now();


maturity =
(inv.start+1814400000)-Date.now();

}



box.innerHTML += `

<div class="plan">


<h3>${p.name}</h3>


<p>
Investment:
KSh ${p.amount.toLocaleString()}
</p>


<p>
ROI: 50%
</p>


<p>
Status:
${active?"ACTIVE":"LOCKED"}
</p>


<p style="color:#00ff88">

Profit:
KSh ${(p.amount*0.5).toLocaleString()}

</p>



${active ? `

<p>
Next Profit:

<span id="c${i}">
${format(cycle)}
</span>

</p>


<p>

Maturity:

<span id="m${i}">
${format(maturity)}
</span>

</p>

`:

`

<p>
Maturity:
21 Days After Activation
</p>

`}



<button onclick="invest(${i})"
${active?"disabled":""}>

${active?"Invested":"Invest Now"}

</button>


</div>

`;

});


}







setInterval(()=>{


Object.keys(currentInvestments)
.forEach(key=>{


let inv=currentInvestments[key];


if(!inv ||
inv.status!=="running")
return;



let i=key.replace("plan_","");



let c=document.getElementById("c"+i);

let m=document.getElementById("m"+i);



if(c){

c.innerHTML =
format(
(inv.lastProfit+259200000)-Date.now()
);

}



if(m){

m.innerHTML =
format(
(inv.start+1814400000)-Date.now()
);

}



});


},1000);







window.invest = async function(i){

let plan = plans[i];


let snap = await get(
ref(db,`users/${uid}`)
);


let user = snap.val() || {};



let balance = cleanNumber(user.balance);



if(balance < plan.amount){

notify("❌ Insufficient balance");

return;

}




if(user.investments?.["plan_"+i]){

notify("⚠️ Already invested");

return;

}





let investment = {

plan: plan.name,

amount: plan.amount,

status:"running",

roi:50,

start:Date.now(),

lastProfit:Date.now(),

totalProfit:0

};





await set(

ref(db,
`users/${uid}/investments/plan_${i}`),

investment

);





await update(

ref(db,`users/${uid}`),

{

balance: balance - plan.amount

}

);




notify("✅ Invested successfully");


};






setInterval(async()=>{


if(!uid)return;



let snap =
await get(ref(db,`users/${uid}`));



let user=snap.val() || {};

let investments =
user.investments || {};



let changed=false;

let profit=0;



for(let k in investments){


let inv=investments[k];



if(!inv ||
inv.status!=="running")
continue;




if(Date.now()-inv.lastProfit >= 259200000){


inv.totalProfit =
cleanNumber(inv.totalProfit)
+
(cleanNumber(inv.amount)*0.5);



inv.lastProfit =
Date.now();



changed=true;


}



profit += cleanNumber(inv.totalProfit);



}




if(changed){


await update(
ref(db,`users/${uid}`),

{

investments,

profit

}

);


}



},60000);



</script>
