<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Apex Market Investment Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Poppins,sans-serif
}


body{
background:#050816;
color:white;
padding-bottom:90px;
overflow-x:hidden;
}


.header{
padding:20px;
text-align:center;
font-size:22px;
font-weight:700;

background:
linear-gradient(135deg,
rgba(0,247,255,.25),
rgba(0,102,255,.15));

box-shadow:0 0 30px #0066ff;
}



.container{
padding:15px;
}



.summary{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:20px;

}



.card{

padding:18px;
border-radius:22px;

background:
linear-gradient(145deg,
rgba(0,247,255,.20),
rgba(0,102,255,.15));

border:1px solid rgba(0,247,255,.4);

box-shadow:
0 0 25px rgba(0,247,255,.35);

text-align:center;

}



.card h3{

font-size:13px;
color:#aaa;

}



.card h2{

margin-top:10px;
color:#00f7ff;

}





#plans{
padding:15px;
}



.plan{

padding:20px;
margin-bottom:20px;

border-radius:25px;

background:
linear-gradient(145deg,
rgba(255,255,255,.12),
rgba(0,102,255,.10));

border:1px solid rgba(0,247,255,.35);

box-shadow:
0 0 30px rgba(0,247,255,.25);

backdrop-filter:blur(20px);

}



.plan h3{

color:#00f7ff;
text-align:center;
margin-bottom:15px;

}



.plan p{

margin:8px 0;
color:#ddd;

}



button{

width:100%;
padding:14px;

border:none;
border-radius:15px;

background:
linear-gradient(90deg,
#00f7ff,
#0066ff);

color:white;
font-weight:700;

margin-top:15px;

box-shadow:
0 0 20px #0066ff;

}



button:disabled{

background:#444;
box-shadow:none;

}




.bottom-nav{

position:fixed;
bottom:0;
left:0;
right:0;

height:70px;

display:flex;
justify-content:space-around;
align-items:center;

background:#091326;

z-index:999;

}



.nav-btn{

color:#aaa;
text-decoration:none;
font-size:12px;
text-align:center;

}



.nav-icon{

font-size:20px;
display:block;

}



.active-nav{

color:#00f7ff;

}





</style>

</head>


<body>


<div class="header">
APEX MARKET INVESTMENT HUB
</div>



<div class="container">


<div class="summary">


<div class="card">

<h3>Balance</h3>

<h2 id="mainBalance">
KSh 0
</h2>

</div>




<div class="card">

<h3>Profit</h3>

<h2 id="totalProfit">
KSh 0
</h2>

</div>



</div>


</div>



<div id="plans"></div>





<div class="bottom-nav">


<a class="nav-btn" href="dashboard.html">

<span class="nav-icon">⌂</span>
Home

</a>


<a class="nav-btn" href="tasks.html">

<span class="nav-icon">✓</span>
Tasks

</a>



<a class="nav-btn active-nav" href="plans.html">

<span class="nav-icon">◈</span>
Plans

</a>



<a class="nav-btn" href="team.html">

<span class="nav-icon">◉</span>
Team

</a>



<a class="nav-btn" href="profile.html">

<span class="nav-icon">◌</span>
Profile

</a>



</div>







<script type="module">

import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue,
get,
set,
update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey:"AIzaSyC-d_LdGleI1U1NEWLjz7FPz7gPycVOB_4",

authDomain:"apex-market-investment-h-643fc.firebaseapp.com",

databaseURL:"https://apex-market-investment-h-643fc-default-rtdb.europe-west1.firebasedatabase.app",

projectId:"apex-market-investment-h-643fc",

storageBucket:"apex-market-investment-h-643fc.firebasestorage.app",

messagingSenderId:"96469134780",

appId:"1:96469134780:web:b1b443b0467083f843cfb9",

measurementId:"G-NB3LXMPGTV"

};


const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const auth = getAuth(app);



const plans=[

{name:"Starter Plan",amount:1000},
{name:"Bronze Plan",amount:2500},
{name:"Silver Plan",amount:5000},
{name:"Gold Plan",amount:10000},
{name:"Premium Plan",amount:20000},
{name:"Elite Plan",amount:30000},
{name:"Diamond Plan",amount:50000},
{name:"VIP Plan",amount:75000},
{name:"Executive Plan",amount:100000},
{name:"Ultimate Plan",amount:200000}

];


let uid="";
let investments={};



function money(x){

return Number(x||0).toLocaleString();

}



function popup(msg){

let box=document.createElement("div");

box.innerHTML=msg;

box.style.cssText=`

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);

background:#0066ff;
padding:25px;
border-radius:20px;

color:white;
font-weight:700;

z-index:99999;
box-shadow:0 0 30px #00f7ff;

`;

document.body.appendChild(box);


setTimeout(()=>{

box.remove();

},2000);

}




function timer(ms){

if(ms<=0)
return "Ready";


let sec=Math.floor(ms/1000);

let h=Math.floor(sec/3600);

let m=Math.floor((sec%3600)/60);

let s=sec%60;


return `${h}h ${m}m ${s}s`;

}





onAuthStateChanged(auth,user=>{


if(!user){

location="login.html";
return;

}


uid=user.uid;



onValue(
ref(db,`users/${uid}`),
snap=>{


let data=snap.val()||{};



document.getElementById("mainBalance")
.innerHTML =
"KSh "+money(data.balance);



investments=data.investments||{};



let profit=0;


Object.values(investments)
.forEach(i=>{

profit += Number(i.totalProfit||0);

});



document.getElementById("totalProfit")
.innerHTML =
"KSh "+money(profit);



render();


});


});






function render(){


let box=document.getElementById("plans");


box.innerHTML="";



plans.forEach((p,i)=>{


let inv=investments["plan_"+i];


let active =
inv &&
inv.status==="running";



let unlock =
active &&
(Date.now()-inv.start < 259200000);



let profit =
p.amount*0.5;



box.innerHTML += `


<div class="plan">


<h3>${p.name}</h3>


<p>
Price:
<b>
KSh ${money(p.amount)}
</b>
</p>


<p>
Profit after 72hrs:
<b style="color:#00ff88">
KSh ${money(profit)}
</b>
</p>


<p>
After 21 days:
<b>
KSh ${money(p.amount+(profit*7))}
</b>
</p>



<p>
Status:
${active?"ACTIVE":"AVAILABLE"}
</p>



${active ? `

<p>
72hrs unlock:

<span id="t${i}">
${timer(
(inv.start+259200000)-Date.now()
)}
</span>

</p>

`
:
""
}




<button

onclick="invest(${i})"

${unlock?"disabled":""}

>


${active ? 
(unlock?"Invested":"Available again")
:
"Invest Now"}

</button>



</div>


`;

});


}







window.invest = async function(i){


let plan=plans[i];


let snap =
await get(
ref(db,`users/${uid}`)
);


let user=snap.val()||{};



let balance =
Number(user.balance||0);





if(balance < plan.amount){

popup("Insufficient balance");

return;

}





if(user.investments?.["plan_"+i]){


let inv=user.investments["plan_"+i];


if(Date.now()-inv.start < 259200000){

popup("Plan still locked");

return;

}

}





let now=Date.now();




await set(

ref(
db,
`users/${uid}/investments/plan_${i}`
),

{

plan:plan.name,

amount:plan.amount,

status:"running",

roi:50,

start:now,

lastProfit:now,

totalProfit:0

}


);





await update(

ref(db,`users/${uid}`),

{

balance:
balance-plan.amount

}

);





popup("Invested success");


};






setInterval(()=>{


Object.keys(investments)
.forEach(key=>{


let inv=investments[key];


if(!inv || inv.status!=="running")
return;



let i=key.replace("plan_","");

let el=document.getElementById("t"+i);



if(el){

el.innerHTML =
timer(
(inv.start+259200000)-Date.now()
);

}


});


},1000);







setInterval(async()=>{


if(!uid)return;



let snap =
await get(
ref(db,`users/${uid}`)
);



let data=snap.val()||{};



let invs=data.investments||{};


let changed=false;



for(let k in invs){


let inv=invs[k];



if(
inv &&
inv.status==="running" &&
Date.now()-inv.lastProfit>=259200000
){


inv.totalProfit =
Number(inv.totalProfit||0)
+
(Number(inv.amount)*0.5);



inv.lastProfit=Date.now();


changed=true;


}


}





if(changed){


await update(

ref(db,`users/${uid}`),

{

investments:invs

}

);


}



},60000);



</script>


</body>
</html>
