<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apex Market Investment Hub Company - Withdraw</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0b1220, #050814);
    color: #fff;
}

.header {
    text-align: center;
    padding: 22px;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
    box-shadow: 0 0 30px rgba(0,255,255,0.25);
}

.container {
    max-width: 850px;
    margin: 30px auto;
    padding: 20px;
}

.card {
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(0,255,255,0.15);
}

.balance {
    text-align: center;
    font-size: 22px;
    padding: 16px;
    border-radius: 14px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
}

label {
    margin-top: 14px;
    display: block;
    font-size: 13px;
    color: #cbd5e1;
}

select, input {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    border-radius: 12px;
    border: none;
    background: #0f172a;
    color: #fff;
}

button {
    width: 100%;
    margin-top: 22px;
    padding: 15px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(90deg, #00f5a0, #00d9f5);
    font-weight: bold;
    cursor: pointer;
}

/* MODAL */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    z-index: 9998;
}

.modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(0,255,170,0.15);
    padding: 25px;
    border-radius: 16px;
    display: none;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,255,200,0.4);
    z-index: 9999;
}

.hidden { display:none; }

footer {
    text-align:center;
    padding:15px;
    color:#94a3b8;
    margin-top:30px;
}
</style>
</head>

<body>

<div class="header">
APEX MARKET INVESTMENT HUB COMPANY
</div>

<div class="container">

<div class="card">

<div class="balance">
Main Balance: KSH <span id="balance">Loading...</span>
</div>

<label>Select Method</label>
<select id="method" onchange="toggleMethod()">
    <option value="">Select</option>
    <option value="mobile">Mobile Money</option>
    <option value="bank">Bank Withdrawal</option>
</select>

<!-- MOBILE -->
<div id="mobileBox" class="hidden">
    <label>Mobile Provider</label>
    <select id="mobileProvider">
        <option>Safaricom</option>
        <option>Airtel Money</option>
    </select>

    <label>Phone Number</label>
    <input id="phone" placeholder="Enter phone number"/>
</div>

<!-- BANK (FIXED & COMPLETE) -->
<div id="bankBox" class="hidden">
    <label>Bank Name</label>
    <select id="bankName">
        <option>Equity Bank</option>
        <option>I&M Bank</option>
        <option>KCB Bank</option>
        <option>Cooperative Bank</option>
        <option>Stanbic Bank</option>
        <option>National Bank</option>
        <option>Family Bank</option>
    </select>

    <label>Account Number</label>
    <input id="account" placeholder="Enter account number"/>
</div>

<label>Amount (Min 600)</label>
<input type="number" id="amount"/>

<button onclick="withdraw()">Withdraw Funds</button>

</div>
</div>

<div class="overlay" id="overlay"></div>
<div class="modal" id="modal"></div>

<footer>
© 2026 Apex Market Investment Hub Company
</footer>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-d_LdGleI1U1NEWLjz7FPz7gPycVOB_4",
  authDomain: "apex-market-investment-h-643fc.firebaseapp.com",
  databaseURL: "https://apex-market-investment-h-643fc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "apex-market-investment-h-643fc",
  storageBucket: "apex-market-investment-h-643fc.firebasestorage.app",
  messagingSenderId: "96469134780",
  appId: "1:96469134780:web:b1b443b0467083f843cfb9",
  measurementId: "G-NB3LXMPGTV"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const userId = "user_123";

/* REAL-TIME BALANCE */
db.ref("users/" + userId + "/balance").on("value", snap => {
    document.getElementById("balance").innerText = snap.val() || 0;
});

/* TOGGLE METHOD */
function toggleMethod() {
    let m = document.getElementById("method").value;

    document.getElementById("mobileBox").classList.add("hidden");
    document.getElementById("bankBox").classList.add("hidden");

    if (m === "mobile") document.getElementById("mobileBox").classList.remove("hidden");
    if (m === "bank") document.getElementById("bankBox").classList.remove("hidden");
}

/* MODAL */
function show(msg){
    document.getElementById("modal").innerText = msg;
    document.getElementById("overlay").style.display = "block";
    document.getElementById("modal").style.display = "block";

    setTimeout(() => {
        document.getElementById("overlay").style.display = "none";
        document.getElementById("modal").style.display = "none";
    }, 2000);
}

/* WITHDRAW (FINAL FIX) */
function withdraw(){

    let amount = Number(document.getElementById("amount").value);
    let method = document.getElementById("method").value;

    if(!method) return show("Select method");
    if(!amount || amount < 600) return show("Minimum withdrawal is 600");

    let balanceRef = db.ref("users/" + userId + "/balance");

    balanceRef.once("value", snap => {

        let balance = snap.val() || 0;

        if(amount > balance){
            return show("Insufficient balance");
        }

        let newBalance = balance - amount;

        // UPDATE BALANCE
        balanceRef.set(newBalance);

        let data = {
            userId,
            method,
            amount,
            status: "pending",
            createdAt: new Date().toISOString()
        };

        if(method === "mobile"){
            let phone = document.getElementById("phone").value;
            if(!phone) return show("Enter phone number");

            data.provider = document.getElementById("mobileProvider").value;
            data.phone = phone;
        }

        if(method === "bank"){
            let acc = document.getElementById("account").value;
            if(!acc) return show("Enter account number");

            data.bank = document.getElementById("bankName").value;
            data.account = acc;
        }

        // 🔥 MAIN FIX: SAVE FOR HISTORY PAGE
        db.ref("transactions/" + userId).push(data);

        // backup
        db.ref("withdrawals/" + userId).push(data);

        show("Withdrawal submitted successfully");

        setTimeout(() => {
            window.location.href = "transaction-history.html";
        }, 1500);
    });
}
</script>

</body>
</html>
