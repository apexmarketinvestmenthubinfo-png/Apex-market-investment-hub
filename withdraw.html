<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apex Market Investment Hub Company - Withdraw</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0b1220, #050814);
    color: #fff;
    min-height: 100vh;
}

/* HEADER */
.header {
    text-align: center;
    padding: 22px;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
    box-shadow: 0 0 30px rgba(0,255,255,0.25);
}

/* WRAPPER */
.container {
    max-width: 800px;
    margin: 30px auto;
    padding: 20px;
}

/* CARD */
.card {
    margin-top: 20px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(0,255,255,0.15);
    box-shadow: 0 0 25px rgba(0,255,255,0.08);
}

/* BALANCE */
.balance {
    text-align: center;
    font-size: 22px;
    padding: 16px;
    border-radius: 14px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    box-shadow: 0 0 20px rgba(0,114,255,0.4);
}

/* FORM */
label {
    margin-top: 14px;
    display: block;
    font-size: 13px;
    color: #cbd5e1;
}

select, input {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: #0f172a;
    color: #fff;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 22px;
    padding: 15px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(90deg, #00f5a0, #00d9f5);
    color: #000;
    font-weight: bold;
}

/* HIDDEN */
.hidden { display: none; }

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    font-size: 13px;
    color: #94a3b8;
    margin-top: 30px;
    border-top: 1px solid rgba(255,255,255,0.08);
}

/* CENTER MODAL */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    display: none;
    z-index: 9998;
}

.modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,255,170,0.12);
    border: 1px solid rgba(0,255,170,0.4);
    padding: 25px 35px;
    border-radius: 16px;
    text-align: center;
    font-size: 16px;
    color: #fff;
    display: none;
    z-index: 9999;
    box-shadow: 0 0 35px rgba(0,255,200,0.35);
}
</style>
</head>

<body>

<div class="header">
    APEX MARKET INVESTMENT HUB COMPANY
</div>

<div class="container">

<div class="card">

    <div class="balance">
        Main Balance: KSH <span id="balance">Loading...</span>
    </div>

    <label>Select Method of Withdrawal</label>
    <select id="method" onchange="toggleMethod()">
        <option value="">-- Select Method --</option>
        <option value="mobile">Mobile Money</option>
        <option value="bank">Bank Withdrawal</option>
    </select>

    <!-- MOBILE -->
    <div id="mobileSection" class="hidden">
        <label>Mobile Provider</label>
        <select id="mobileProvider">
            <option>Safaricom</option>
            <option>Airtel Money</option>
        </select>

        <label>Mobile Number</label>
        <input type="text" id="mobileNumber" placeholder="Enter phone number"/>
    </div>

    <!-- BANK -->
    <div id="bankSection" class="hidden">
        <label>Select Bank</label>
        <select id="bankName">
            <option>Equity Bank</option>
            <option>I&M Bank</option>
            <option>KCB Bank</option>
            <option>Cooperative Bank</option>
            <option>Stanbic Bank</option>
            <option>National Bank</option>
            <option>Family Bank</option>
        </select>

        <label>Account Number</label>
        <input type="text" id="accountNumber" placeholder="Enter account number"/>
    </div>

    <label>Amount (Minimum KSH 600)</label>
    <input type="number" id="amount" placeholder="Enter amount"/>

    <button onclick="submitWithdrawal()">Withdraw Funds</button>

</div>

</div>

<footer>
    © 2026 Apex Market Investment Hub Company • All Rights Reserved
</footer>

<!-- MODAL -->
<div id="overlay" class="overlay"></div>
<div id="modal" class="modal">
    <div id="modalText"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.20.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-d_LdGleI1U1NEWLjz7FPz7gPycVOB_4",
  authDomain: "apex-market-investment-h-643fc.firebaseapp.com",
  databaseURL: "https://apex-market-investment-h-643fc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "apex-market-investment-h-643fc",
  storageBucket: "apex-market-investment-h-643fc.firebasestorage.app",
  messagingSenderId: "96469134780",
  appId: "1:96469134780:web:b1b443b0467083f843cfb9",
  measurementId: "G-NB3LXMPGTV"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const userId = "user_123";

/* LIVE BALANCE */
db.ref("users/" + userId + "/balance").on("value", snap => {
    document.getElementById("balance").innerText = snap.val() || 0;
});

/* CENTER MODAL */
function showMessage(msg) {
    document.getElementById("modalText").innerText = msg;
    document.getElementById("overlay").style.display = "block";
    document.getElementById("modal").style.display = "block";

    setTimeout(() => {
        document.getElementById("overlay").style.display = "none";
        document.getElementById("modal").style.display = "none";
    }, 2000);
}

/* SWITCH METHOD */
function toggleMethod() {
    const method = document.getElementById("method").value;

    document.getElementById("mobileSection").classList.add("hidden");
    document.getElementById("bankSection").classList.add("hidden");

    if (method === "mobile") {
        document.getElementById("mobileSection").classList.remove("hidden");
    }

    if (method === "bank") {
        document.getElementById("bankSection").classList.remove("hidden");
    }
}

/* WITHDRAW */
function submitWithdrawal() {

    const method = document.getElementById("method").value;
    const amount = parseFloat(document.getElementById("amount").value);

    if (!method) return showMessage("Select withdrawal method");
    if (!amount || amount < 600) return showMessage("Minimum withdrawal is KSH 600");

    let data = {
        method,
        amount,
        status: "pending",
        createdAt: new Date().toISOString()
    };

    if (method === "mobile") {
        data.provider = document.getElementById("mobileProvider").value;
        data.number = document.getElementById("mobileNumber").value;
        if (!data.number) return showMessage("Enter mobile number");
    }

    if (method === "bank") {
        data.bank = document.getElementById("bankName").value;
        data.account = document.getElementById("accountNumber").value;
        if (!data.account) return showMessage("Enter account number");
    }

    db.ref("withdrawals/" + userId).push(data);

    showMessage("Withdrawal submitted successfully");

    setTimeout(() => {
        window.location.href = "transaction-history.html";
    }, 1500);
}
</script>

</body>
</html>
