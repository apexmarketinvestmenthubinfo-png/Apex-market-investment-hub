<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile • Apex Market Investment Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#050816;
    color:#fff;
    padding-bottom:90px;
    overflow-x:hidden;
}

/* Glow Background */

body::before,
body::after{
    content:'';
    position:fixed;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(150px);
    opacity:.25;
    z-index:-1;
}

body::before{
    background:#00f7ff;
    top:-120px;
    left:-120px;
}

body::after{
    background:#6a00ff;
    bottom:-120px;
    right:-120px;
}

/* Header */

.header{
    text-align:center;
    padding:25px 15px;
}

.platform-name{
    font-size:28px;
    font-weight:700;
    color:#00f7ff;
    text-shadow:0 0 20px rgba(0,247,255,.6);
}

.subtitle{
    margin-top:8px;
    color:#b5c4df;
}

/* Container */

.container{
    padding:15px;
}

/* Glass Cards */

.card{
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:28px;

    padding:22px;

    margin-bottom:20px;

    box-shadow:
        0 15px 45px rgba(0,0,0,.4),
        0 0 30px rgba(0,247,255,.08);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.label{
    color:#b9c6df;
    font-size:14px;
}

.value{
    margin-top:8px;
    font-size:24px;
    font-weight:700;
    color:#00f7ff;
}

.status-active{
    color:#00ff88;
    font-weight:600;
}

/* Action Cards */

.action-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.action-card{
    position:relative;
    overflow:hidden;

    background:
    linear-gradient(
        135deg,
        rgba(14,28,56,.92),
        rgba(8,16,35,.92)
    );

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:24px;

    padding:25px 20px;

    text-align:center;

    cursor:pointer;

    transition:.35s ease;

    box-shadow:
        0 15px 35px rgba(0,0,0,.45),
        0 0 20px rgba(0,247,255,.08);

    isolation:isolate;
}

/* Animated Glow */
.action-card::before{
    content:'';

    position:absolute;

    inset:-2px;

    border-radius:24px;

    background:
    linear-gradient(
        135deg,
        rgba(0,247,255,.55),
        rgba(0,102,255,.25),
        rgba(106,0,255,.45)
    );

    opacity:.35;

    filter:blur(22px);

    z-index:-2;

    transition:.35s ease;
}

/* Glass Shine */
.action-card::after{
    content:'';

    position:absolute;

    top:-60%;
    left:-130%;

    width:70%;
    height:220%;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.12),
        transparent
    );

    transform:rotate(25deg);

    transition:.7s ease;
}

.action-card:hover{
    transform:
        translateY(-6px)
        scale(1.02);

    box-shadow:
        0 25px 50px rgba(0,0,0,.55),
        0 0 35px rgba(0,247,255,.28);
}

.action-card:hover::before{
    opacity:.6;
}

.action-card:hover::after{
    left:150%;
}

.action-icon{
    font-size:34px;

    margin-bottom:14px;

    text-shadow:
        0 0 15px rgba(0,247,255,.6),
        0 0 30px rgba(0,247,255,.35);
}

.action-title{
    font-size:15px;
    font-weight:700;
    letter-spacing:.4px;
    color:#f3f7ff;
}

/* Transaction History Card */

.history-card{
    margin-top:15px;

    background:
    linear-gradient(
        135deg,
        rgba(18,34,66,.94),
        rgba(7,16,35,.94)
    );
}
/* Logout */

.logout-btn{
    width:100%;

    padding:16px;

    border:none;

    border-radius:18px;

    background:linear-gradient(90deg,#ff416c,#ff4b2b);

    color:#fff;

    font-size:16px;
    font-weight:700;

    cursor:pointer;
}

/* Logout Modal */

.modal{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.7);
    backdrop-filter:blur(6px);

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    visibility:hidden;

    transition:.3s ease;

    z-index:9999;
}

.modal.show{
    opacity:1;
    visibility:visible;
}

.modal-card{
    width:90%;
    max-width:350px;

    background:#0d1833;

    border-radius:28px;

    padding:25px;

    text-align:center;

    border:1px solid rgba(255,255,255,.08);
}

.modal-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:10px;
}

.modal-text{
    color:#c8d4ea;
    margin-bottom:25px;
}

.modal-buttons{
    display:flex;
    gap:12px;
}

.modal-buttons button{
    flex:1;

    padding:14px;

    border:none;

    border-radius:14px;

    font-weight:600;

    cursor:pointer;
}

.stay-btn{
    background:#2b3554;
    color:white;
}

.confirm-btn{
    background:#ff4b2b;
    color:white;
}

/* Bottom Nav */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;

    height:72px;

    display:flex;
    justify-content:space-evenly;
    align-items:center;

    padding:0 8px;

    background:rgba(9,19,38,.95);

    backdrop-filter:blur(25px);

    border-top:1px solid rgba(255,255,255,.08);

    z-index:999;
}

.nav-btn{
    flex:1;

    display:flex;
    flex-direction:row;

    justify-content:center;
    align-items:center;

    gap:6px;

    text-decoration:none;

    color:#9ba7c7;

    font-size:12px;
    font-weight:600;
}

.nav-icon{
    font-size:20px;
}

.active-nav{
    color:#00f7ff;
}

</style>
</head>

<body>

<div class="header">
    <div class="platform-name">
        APEX MARKET INVESTMENT HUB
    </div>

    <div class="subtitle">
        Profile Center
    </div>
</div>

<div class="container">

    <!-- Email Card -->

    <div class="card">

        <div class="row">

            <div>
                <div class="label">User Gmail</div>

                <div class="value"
                     id="userEmail"
                     style="font-size:16px;">
                    Loading...
                </div>
            </div>

            <div>
                <div class="label">Status</div>

                <div class="status-active">
                    Profile Active
                </div>
            </div>

        </div>

    </div>

    <!-- Balance Card -->

    <div class="card">

        <div class="row">

            <div>
                <div class="label">Main Balance</div>

                <div class="value"
                     id="mainBalance">
                    KES 0
                </div>
            </div>

            <div>
                <div class="label">Total Earnings</div>

                <div class="value"
                     id="totalEarnings">
                    KES 0
                </div>
            </div>

        </div>

    </div>

    <!-- Action Cards -->

    <div class="action-grid">

        <div class="action-card"
             onclick="location.href='deposit.html'">

            <div class="action-icon">💰</div>

            <div class="action-title">
                Deposit
            </div>

        </div>

        <div class="action-card"
             onclick="location.href='withdraw.html'">

            <div class="action-icon">💳</div>

            <div class="action-title">
                Withdraw
            </div>

        </div>

    </div>

    <div class="action-card transaction-card"
         onclick="location.href='transaction.html'">

        <div class="action-icon">📜</div>

        <div class="action-title">
            Transaction
        </div>

    </div>

    <!-- Logout -->

    <div class="card">

        <button class="logout-btn"
                onclick="showLogout()">

            Logout

        </button>

    </div>

</div>

<!-- Logout Modal -->

<div class="modal" id="logoutModal">

    <div class="modal-card">

        <div class="modal-title">
            Logout
        </div>

        <div class="modal-text">
            Are you sure you want to logout?
        </div>

        <div class="modal-buttons">

            <button class="stay-btn"
                    onclick="hideLogout()">

                Stay

            </button>

            <button class="confirm-btn"
                    onclick="logout()">

                Logout

            </button>

        </div>

    </div>

</div>

<!-- Bottom Navigation -->

<div class="bottom-nav">

    <a href="dashboard.html" class="nav-btn">
        <span class="nav-icon">⌂</span>
        <span>Home</span>
    </a>

    <a href="tasks.html" class="nav-btn">
        <span class="nav-icon">✓</span>
        <span>Tasks</span>
    </a>

    <a href="plans.html" class="nav-btn">
        <span class="nav-icon">◈</span>
        <span>Plans</span>
    </a>

    <a href="team.html" class="nav-btn">
        <span class="nav-icon">◎</span>
        <span>Team</span>
    </a>

    <a href="profile.html" class="nav-btn active-nav">
        <span class="nav-icon">◌</span>
        <span>Profile</span>
    </a>

</div>

<script type="module">

import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig = {

apiKey:"AIzaSyC-d_LdGleI1U1NEWLjz7FPz7gPycVOB_4",

authDomain:"apex-market-investment-h-643fc.firebaseapp.com",

databaseURL:"https://apex-market-investment-h-643fc-default-rtdb.europe-west1.firebasedatabase.app",

projectId:"apex-market-investment-h-643fc",

storageBucket:"apex-market-investment-h-643fc.firebasestorage.app",

messagingSenderId:"96469134780",

appId:"1:96469134780:web:b1b443b0467083f843cfb9",

measurementId:"G-NB3LXMPGTV"

};



const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const auth = getAuth(app);



function money(x){

return Number(x||0)
.toLocaleString();

}



onAuthStateChanged(auth,user=>{


if(!user){

location="login.html";

return;

}



document.getElementById("userEmail")
.innerHTML=user.email;



const uid=user.uid;



onValue(
ref(db,`users/${uid}`),
snap=>{


let data=snap.val()||{};



let balance =
Number(data.balance||0);



let profit=0;



let investments =
data.investments||{};



Object.values(investments)
.forEach(inv=>{


if(inv){

profit += Number(inv.totalProfit||0);

}


});





document.getElementById("mainBalance")
.innerHTML =
"KSh "+money(balance);




document.getElementById("totalEarnings")
.innerHTML =
"KSh "+money(profit);



});



});






window.logout=function(){


signOut(auth)
.then(()=>{

location="login.html";

});


}



window.showLogout=function(){

document
.getElementById("logoutModal")
.classList.add("show");

}



window.hideLogout=function(){

document
.getElementById("logoutModal")
.classList.remove("show");

}



</script>

</body>
</html>
