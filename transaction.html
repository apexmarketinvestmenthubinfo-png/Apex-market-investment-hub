<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Apex Market Investment Hub Company - Transaction</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0b1220, #050814);
    color: #fff;
}

/* HEADER */
.header {
    text-align: center;
    padding: 22px;
    font-size: 18px;
    font-weight: bold;
    background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
    box-shadow: 0 0 30px rgba(0,255,255,0.25);
}

/* WRAPPER */
.container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
}

/* FILTER BAR */
.filters {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    color: #fff;
    border: 1px solid rgba(0,255,255,0.15);
    transition: 0.3s;
}

.filter-btn:hover {
    background: rgba(0,255,200,0.15);
    box-shadow: 0 0 15px rgba(0,255,200,0.3);
}

/* TABLE */
.table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,255,255,0.08);
}

.table th, .table td {
    padding: 14px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.table th {
    background: rgba(0,255,255,0.08);
    font-weight: bold;
}

/* STATUS COLORS */
.status {
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
}

.pending {
    background: rgba(255, 204, 0, 0.15);
    color: #facc15;
    border: 1px solid #facc15;
}

.approved {
    background: rgba(0, 255, 120, 0.15);
    color: #22c55e;
    border: 1px solid #22c55e;
}

.rejected {
    background: rgba(255, 0, 80, 0.15);
    color: #ef4444;
    border: 1px solid #ef4444;
}

/* TYPE TAG */
.type {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 6px;
}

.deposit {
    background: rgba(0,150,255,0.15);
    color: #38bdf8;
}

.withdraw {
    background: rgba(255,100,0,0.15);
    color: #fb923c;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    font-size: 13px;
    color: #94a3b8;
    margin-top: 30px;
    border-top: 1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>

<div class="header">
    APEX MARKET INVESTMENT HUB COMPANY
</div>

<div class="container">

<div class="filters">
    <button class="filter-btn" onclick="filterData('all')">All</button>
    <button class="filter-btn" onclick="filterData('deposit')">Deposit</button>
    <button class="filter-btn" onclick="filterData('withdraw')">Withdraw</button>
</div>

<table class="table">
    <thead>
        <tr>
            <th>Type</th>
            <th>Amount (KSH)</th>
            <th>Method</th>
            <th>Status</th>
            <th>Date</th>
        </tr>
    </thead>
    <tbody id="txBody">
    </tbody>
</table>

</div>

<footer>
    © 2026 Apex Market Investment Hub Company • All Rights Reserved
</footer>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
    getAuth,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC-d_LdGleI1U1NEWLjz7FPz7gPycVOB_4",
  authDomain: "apex-market-investment-h-643fc.firebaseapp.com",
  databaseURL: "https://apex-market-investment-h-643fc-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "apex-market-investment-h-643fc",
  storageBucket: "apex-market-investment-h-643fc.firebasestorage.app",
  messagingSenderId: "96469134780",
  appId: "1:96469134780:web:b1b443b0467083f843cfb9",
  measurementId: "G-NB3LXMPGTV"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let allTransactions = [];

onAuthStateChanged(auth, (user) => {

    if (!user) {
        window.location.href = "transaction.html";
        return;
    }

    onValue(
        ref(db, `users/${user.uid}/transactions`),
        (snapshot) => {

            const data = snapshot.val() || {};

            allTransactions = Object.keys(data).map(key => ({
                id: key,
                ...data[key]
            }));

            display(allTransactions);
        }
    );
});

function display(list) {

    const body = document.getElementById("txBody");

    body.innerHTML = "";

    list.sort((a, b) => b.createdAt - a.createdAt);

    list.forEach(tx => {

        body.innerHTML += `
        <tr>
            <td>
                <span class="type ${tx.type}">
                    ${tx.type}
                </span>
            </td>

            <td>
                ${tx.amount}
            </td>

            <td>
                ${tx.method || "-"}
            </td>

            <td>
                <span class="status ${tx.status}">
                    ${tx.status}
                </span>
            </td>

            <td>
                ${new Date(tx.createdAt).toLocaleString()}
            </td>
        </tr>
        `;
    });
}

window.filterData = function(type) {

    if (type === "all") {
        display(allTransactions);
    } else {
        display(
            allTransactions.filter(tx => tx.type === type)
        );
    }
};
</script>

</body>
</html>
